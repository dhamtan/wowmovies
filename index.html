    <title>PRI-MOVIES - Watch Latest HD Movies & Web Series Free Online</title>
    <meta name="title" content="PRI-MOVIES - Watch Latest HD Movies & Web Series Free Online">
    <meta name="description" content="Watch the latest Hollywood, Bollywood, South Indian movies and Hindi web series in HD for free on PRI-MOVIES.">
    <link rel="canonical" href="https://pri-movies.pages.dev/">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/png" href="https://www.themoviedb.org/favicon.ico">

    <meta property="og:url" content="https://pri-movies.pages.dev/">

    <meta property="og:image" content="https://www.themoviedb.org/assets/2/v4/logos/v2/blue_square_2-d53d28331f51ed07d6cd1aa3a1bd7e35.svg">

    <script src="https://cdn.tailwindcss.com"></script>
    
    <script async data-cfasync="false" src="https://pl28735283.effectivegatecpm.com/745c1ef3a6af871203febf2e53f94208/invoke.js"></script>

    <style>
        :root { --main-orange: #ff4f00; --bg-dark: #0b0d12; --card-bg: #1a1d24; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        
        .site-header { background: #000; padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #1a1a1a; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 19px; font-weight: 900; color: var(--main-orange); font-style: italic; text-transform: uppercase; cursor: pointer; }
        
        #hero-slider { position: relative; width: 100%; height: 32vh; background: #000; overflow: hidden; }
        .poster-3d { position: absolute; inset: 0; opacity: 0; transition: opacity 0.6s ease; z-index: 1; }
        .poster-active { opacity: 1; z-index: 10; }

        .movie-grid { display: grid; grid-template-cols: repeat(2, 1fr); gap: 10px; padding: 10px; }
        @media (min-width: 768px) { .movie-grid { grid-template-cols: repeat(5, 1fr); gap: 15px; padding: 15px 70px; } }

        .movie-card { position: relative; border-radius: 8px; overflow: hidden; aspect-ratio: 2/3; background: var(--card-bg); cursor: pointer; border: 1.5px solid #1a1a1a; }
        .movie-card img { width: 100%; height: 100%; object-fit: cover; }
        .movie-card .card-info { position: absolute; bottom: 0; width: 100%; padding: 10px 8px 6px; background: linear-gradient(transparent, rgba(0,0,0,0.95)); }
        .movie-title { font-size: 11px; font-weight: 700; text-transform: uppercase; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .rating-badge { position: absolute; top: 6px; right: 6px; background: #f5c518; color: #000; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 800; z-index: 20; }

        .filter-container { display: flex; overflow-x: auto; gap: 8px; padding: 10px 10px; background: #0b0d12; border-bottom: 1px solid #1a1a1a; }
        .filter-btn { background: #1a1d24; color: #aaa; padding: 5px 12px; border-radius: 6px; font-size: 11px; font-weight: 800; white-space: nowrap; text-transform: uppercase; border: 1px solid #2a2a2a; }
        .filter-btn.active { background: var(--main-orange); color: white; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(8px); display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #1a1a1a; z-index: 1000; }
        .nav-item { color: #666; text-align: center; font-size: 10px; font-weight: bold; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--main-orange); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        #mainIframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="site-header">
    <div class="logo" onclick="location.reload()">PRI-MOVIES</div>
    <div class="flex items-center gap-2">
        <input type="text" id="searchInput" onkeyup="if(event.keyCode===13)triggerSearch()" placeholder="Search..." class="bg-[#1a1d24] text-xs px-3 py-1.5 rounded-lg border border-white/5 outline-none w-28 focus:w-40 transition-all">
        <button onclick="triggerSearch()" class="bg-[#ff4f00] text-[10px] font-bold px-3 py-1.5 rounded-lg uppercase">Search</button>
    </div>
</div>

<div id="click-overlay" style="position:fixed; inset:0; z-index:9999; cursor:pointer;" onclick="handleFirstClick()"></div>

<div id="hero-slider"><div id="slider-content"></div></div>

<div class="filter-container no-scrollbar">
    <button onclick="filterBy('hi', this)" class="filter-btn">🇮🇳 Hindi</button>
    <button onclick="filterBy('en', this)" class="filter-btn">🇺🇸 English</button>
    <button onclick="filterBy('pa', this)" class="filter-btn">Pa</button>
    <button onclick="filterBy('te', this)" class="filter-btn">South</button>
    <button onclick="filterBy('movie', this)" class="filter-btn active">🎬 Movies</button>
    <button onclick="filterBy('tv', this)" class="filter-btn">📺 Webseries</button>
</div>

<div id="popularGrid" class="movie-grid"></div>

<div id="loading" class="text-center p-8 text-gray-500 font-bold text-[10px] uppercase">Loading...</div>

<footer class="p-8 text-center bg-black/40 border-t border-white/5">
    <div class="flex justify-center gap-4 mb-4">
        <button class="bg-[#e91e63] px-4 py-2 rounded text-[10px] font-bold" onclick="alert('Educational Purpose Only')">Disclaimer</button>
        <button class="bg-[#4caf50] px-4 py-2 rounded text-[10px] font-bold" onclick="alert('Contact: help@pri-movies.pages.dev')">Contact</button>
    </div>
    <p class="text-[10px] text-gray-600 font-bold uppercase">© 2026 pri-movies.pages.dev</p>
</footer>

<div class="bottom-nav">
    <div class="nav-item active" onclick="location.reload()">🏠<br>HOME</div>
    <div class="nav-item" onclick="filterBy('movie', this)">🎬<br>MOVIES</div>
    <div class="nav-item" onclick="filterBy('tv', this)">📺<br>SERIES</div>
    <div class="nav-item" onclick="document.getElementById('searchInput').focus()">🔍<br>SEARCH</div>
</div>

<div id="playerOverlay" class="fixed inset-0 bg-black z-[10000] hidden flex flex-col">
    <div class="p-4 flex justify-between items-center bg-black border-b border-white/10">
        <h2 id="playingTitle" class="text-[10px] font-bold text-[#ff4f00] truncate max-w-[70%] uppercase">PLAYING</h2>
        <button onclick="closePlayer()" class="text-xl font-bold bg-white/10 w-8 h-8 rounded-full">✕</button>
    </div>
    <div class="flex-1 bg-black flex items-center justify-center">
        <iframe id="mainIframe" allowfullscreen referrerpolicy="no-referrer"></iframe>
    </div>
    <div class="p-3 bg-[#0b0d12]">
        <div class="flex gap-2 overflow-x-auto no-scrollbar" id="serverList"></div>
    </div>
</div>

<script>
    const API_KEY = '174d0214bf933dd59b3d5ec68a0c967f';
    const ADS_LINK = 'https://www.profitablecpmratenetwork.com/qvxvzh4wbb?key=251ed833a7e6bcaa6af4298a90f372aa';
    let currentPage = 1, currentType = 'movie', currentLang = '', isFetching = false;

    function handleFirstClick() { window.open(ADS_LINK, '_blank'); document.getElementById('click-overlay').style.display = 'none'; }

    async function fetchData(endpoint) {
        const res = await fetch(`https://api.themoviedb.org/3${endpoint}${endpoint.includes('?') ? '&' : '?'}api_key=${API_KEY}`);
        return await res.json();
    }

    async function init() {
        const heroData = await fetchData('/trending/movie/day');
        document.getElementById('slider-content').innerHTML = heroData.results.slice(0, 5).map((m, i) => `
            <div class="poster-3d ${i === 0 ? 'poster-active' : ''}" onclick="playNow('${m.id}','movie', '${m.title.replace(/'/g, "")}')">
                <img src="https://image.tmdb.org/t/p/original${m.backdrop_path}" class="w-full h-full object-cover brightness-50">
                <div class="absolute bottom-6 left-4"><h2 class="text-lg font-black uppercase">${m.title}</h2><div class="mt-2 bg-[#ff4f00] inline-block px-3 py-1 rounded text-[9px] font-bold">WATCH NOW</div></div>
            </div>
        `).join('');
        
        setInterval(() => {
            const posters = document.querySelectorAll('.poster-3d');
            if(posters.length > 0) {
                let active = [...posters].findIndex(p => p.classList.contains('poster-active'));
                posters[active].classList.remove('poster-active');
                posters[(active + 1) % posters.length].classList.add('poster-active');
            }
        }, 5000);
        
        loadMore();
        window.onscroll = () => { if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) loadMore(); };
    }

    async function loadMore() {
        if(isFetching) return; isFetching = true;
        let endpoint = currentLang ? `/discover/movie?with_original_language=${currentLang}&page=${currentPage}` : `/${currentType}/popular?page=${currentPage}`;
        try {
            const data = await fetchData(endpoint);
            data.results.forEach(m => {
                if(!m.poster_path) return;
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `
                    <div class="rating-badge">${m.vote_average.toFixed(1)}</div>
                    <img src="https://image.tmdb.org/t/p/w500${m.poster_path}" loading="lazy" onclick="playNow('${m.id}','${currentType}', '${(m.title || m.name).replace(/'/g, "")}')">
                    <div class="card-info"><div class="movie-title">${m.title || m.name}</div></div>
                `;
                document.getElementById('popularGrid').appendChild(card);
            });
            currentPage++;
        } catch(e) {}
        isFetching = false;
    }

    function playNow(id, type, title) {
        const t = (type === 'tv') ? 'tv' : 'movie';
        document.getElementById('playerOverlay').style.display = 'flex';
        document.getElementById('playingTitle').innerText = title;
        const servers = [
            { n: "S-1 FAST", u: `https://vidsrc.to/embed/${t}/${id}` },
            { n: "S-2 HD", u: `https://embed.su/embed/${t}/${id}` },
            { n: "S-3 MULTI", u: `https://vidsrc.me/embed/${t}?tmdb=${id}` }
        ];
        document.getElementById('serverList').innerHTML = servers.map(s => `<button onclick="document.getElementById('mainIframe').src='${s.u}'" class="bg-[#1a1d24] px-4 py-2 rounded text-[10px] font-bold uppercase min-w-max border border-white/5">${s.n}</button>`).join('');
        document.getElementById('mainIframe').src = servers[0].u;
    }

    function filterBy(val, btn) {
        currentPage = 1; document.getElementById('popularGrid').innerHTML = '';
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if(['hi', 'en', 'pa', 'te'].includes(val)) { currentLang = val; currentType = 'movie'; } 
        else { currentLang = ''; currentType = val; }
        loadMore();
    }

    async function triggerSearch() {
        const q = document.getElementById('searchInput').value; if(!q) return;
        document.getElementById('popularGrid').innerHTML = '';
        const data = await fetchData(`/search/multi?query=${q}`);
        data.results.forEach(m => {
            if(!m.poster_path) return;
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.innerHTML = `<div class="rating-badge">${m.vote_average.toFixed(1)}</div><img src="https://image.tmdb.org/t/p/w500${m.poster_path}" onclick="playNow('${m.id}','${m.media_type}', '${(m.title || m.name).replace(/'/g, "")}')"><div class="card-info"><div class="movie-title">${m.title || m.name}</div></div>`;
            document.getElementById('popularGrid').appendChild(card);
        });
    }

    function closePlayer() { document.getElementById('playerOverlay').style.display = 'none'; document.getElementById('mainIframe').src = ''; }
    
    window.onload = init;
</script>
</body>
</html>
