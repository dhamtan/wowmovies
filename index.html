<!DOCTYPE html>
<html lang="hi">
<head>
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRI-MOVIES - Watch HD Movies & Web Series Free</title>
    
    <meta name="description" content="Stream the latest Hollywood, Bollywood, and South Indian movies in HD for free on PRI-MOVIES.">
    <link rel="icon" type="image/png" href="https://www.themoviedb.org/favicon.ico">

    <script src="https://cdn.tailwindcss.com"></script>
    <script async data-cfasync="false" src="https://pl28735283.effectivegatecpm.com/745c1ef3a6af871203febf2e53f94208/invoke.js"></script>

    <style>
        :root { --main-orange: #ff4f00; --bg-dark: #080a0e; --card-bg: #12151c; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        
        #hero-slider { position: relative; width: 100%; height: 50vh; background: #000; overflow: hidden; }
        .poster-3d { position: absolute; inset: 0; opacity: 0; transition: opacity 0.5s ease; z-index: 1; }
        .poster-active { opacity: 1; z-index: 10; }

        .movie-grid { display: grid; grid-template-cols: repeat(2, 1fr); gap: 12px; padding: 15px; }
        @media (min-width: 768px) { .movie-grid { grid-template-cols: repeat(5, 1fr); gap: 20px; } }

        .movie-card { position: relative; border-radius: 12px; overflow: hidden; aspect-ratio: 2/3; background: var(--card-bg); cursor: pointer; border: 1px solid rgba(255,255,255,0.05); transform: translateZ(0); }
        .movie-card img { width: 100%; height: 100%; object-fit: cover; }
        
        .rating-badge { position: absolute; top: 8px; right: 8px; background: #ffd700; color: #000; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 900; z-index: 20; }
        .share-btn-mini { position: absolute; top: 8px; left: 8px; background: rgba(255,255,255,0.2); backdrop-filter: blur(5px); color: white; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 50%; z-index: 30; transition: 0.2s; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(8,10,14,0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000; }
        .nav-item { color: #888; text-align: center; font-size: 10px; font-weight: bold; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--main-orange); }

        .filter-btn { background: #1e232b; color: white; padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: bold; white-space: nowrap; transition: 0.1s; cursor: pointer; }
        .filter-btn.active { background: var(--main-orange); }

        /* 3D NEON BUTTONS */
        .btn-3d { position: relative; padding: 12px 24px; font-size: 12px; font-weight: 900; text-transform: uppercase; border: none; border-radius: 10px; cursor: pointer; transition: 0.1s; color: white; display: inline-block; box-shadow: 0 5px 0 rgba(0,0,0,0.5); }
        .btn-3d:active { transform: translateY(4px); box-shadow: 0 1px 0 rgba(0,0,0,0.5); }
        .btn-pink { background: #ff007f; box-shadow: 0 5px 0 #9b004d, 0 0 15px rgba(255,0,127,0.4); }
        .btn-green { background: #00ff7f; color: #004d26; box-shadow: 0 5px 0 #009b4d, 0 0 15px rgba(0,255,127,0.4); }

        /* Modal Style */
        .info-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:20000; padding: 20px; overflow-y: auto; }
        .modal-content { background:#111; border:1px solid #333; padding:25px; border-radius:20px; max-width:500px; margin: 80px auto; text-align: center; border-top: 4px solid var(--main-orange); }

        #adblock-msg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.98); z-index:999999; text-align:center; padding-top:30vh; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .skip-control { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 8px 15px; border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    </style>
</head>
<body>

<div id="adblock-msg">
    <div class="max-w-xs mx-auto p-6 bg-[#111] border border-[#ff4f00] rounded-2xl shadow-2xl">
        <h2 class="text-xl font-bold text-[#ff4f00] mb-2">Ad-Block Detected!</h2>
        <p class="text-gray-400 text-sm mb-6">कृपया एड-ब्लॉकर बंद करें और पेज रिफ्रेश करें।</p>
        <button onclick="location.reload()" class="bg-[#ff4f00] w-full py-3 rounded-lg font-bold text-white">REFRESH NOW</button>
    </div>
</div>

<header class="hidden md:flex justify-between items-center p-6 bg-black/50 sticky top-0 z-[500] backdrop-blur-md">
    <div class="text-2xl font-black italic text-[#ff4f00]" onclick="location.reload()">PRI-MOVIES</div>
    <div class="flex gap-6">
        <button onclick="filterBy('movie', this)" class="font-bold hover:text-[#ff4f00]">Movies</button>
        <button onclick="filterBy('tv', this)" class="font-bold hover:text-[#ff4f00]">Web Series</button>
    </div>
</header>

<div id="hero-slider"><div id="slider-content"></div></div>

<div class="px-4 py-6">
    <div class="relative max-w-2xl mx-auto flex gap-2">
        <input type="text" id="searchInput" onkeyup="if(event.keyCode===13)triggerSearch()" placeholder="Search Hollywood, Bollywood..." class="w-full bg-[#1e232b] py-3 px-5 rounded-xl outline-none text-sm border border-white/5 focus:border-[#ff4f00]/50">
        <button onclick="triggerSearch()" class="bg-[#ff4f00] px-6 rounded-xl font-bold text-xs uppercase active:scale-95 transition-transform">Search</button>
    </div>
</div>

<div class="flex overflow-x-auto gap-3 px-4 no-scrollbar mb-4">
    <button id="btn-hi" onclick="filterBy('hi', this)" class="filter-btn">HINDI</button>
    <button id="btn-en" onclick="filterBy('en', this)" class="filter-btn">ENGLISH</button>
    <button id="btn-pa" onclick="filterBy('pa', this)" class="filter-btn">PUNJABI</button>
    <button id="btn-te" onclick="filterBy('te', this)" class="filter-btn">SOUTH</button>
    <button id="btn-movie" onclick="filterBy('movie', this)" class="filter-btn active">MOVIES</button>
    <button id="btn-tv" onclick="filterBy('tv', this)" class="filter-btn">WEBSERIES</button>
</div>

<div id="popularGrid" class="movie-grid"></div>

<div id="loading" class="text-center p-10 text-gray-500 font-bold text-xs uppercase tracking-widest">
    Scroll down to load more...
</div>

<footer class="p-10 bg-[#05070a] text-center border-t border-white/5 mb-10">
    <div class="flex flex-wrap justify-center gap-6 mb-8">
        <button class="btn-3d btn-pink" onclick="openModal('disclaimer')">Disclaimer</button>
        <button class="btn-3d btn-green" onclick="openModal('contact')">Contact Us</button>
    </div>
    <p class="text-[10px] text-gray-600 font-bold uppercase tracking-widest">© 2026 PRI-MOVIES • Premium Experience</p>
</footer>

<div class="bottom-nav md:hidden">
    <div class="nav-item active" onclick="location.reload()">🏠<br>Home</div>
    <div class="nav-item" onclick="filterBy('movie', this)">🎬<br>Movies</div>
    <div class="nav-item" onclick="filterBy('tv', this)">📺<br>Series</div>
    <div class="nav-item" onclick="document.getElementById('searchInput').focus()">🔍<br>Search</div>
</div>

<div id="infoModal" class="info-modal" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h2 id="modalTitle" class="text-white font-black text-2xl mb-4 italic uppercase tracking-tighter"></h2>
        <div id="modalBody" class="text-gray-400 text-sm leading-relaxed px-4"></div>
        <button onclick="document.getElementById('infoModal').style.display='none'" class="mt-8 bg-white text-black px-10 py-2 rounded-full font-black text-xs uppercase">Close</button>
    </div>
</div>

<div id="playerOverlay" class="fixed inset-0 bg-black z-[10000] hidden flex flex-col">
    <div class="p-4 flex justify-between items-center border-b border-white/10 bg-black">
        <h2 id="playingTitle" class="text-xs font-bold text-[#ff4f00] truncate max-w-[60%]">PLAYING...</h2>
        <div class="flex gap-3">
            <button onclick="copyCurrentLink()" class="text-[10px] bg-white/10 px-3 py-1 rounded">🔗 Share</button>
            <button onclick="closePlayer()" class="text-xl font-bold bg-white/10 w-8 h-8 rounded-full">✕</button>
        </div>
    </div>
    <div class="flex-1 relative">
        <iframe id="mainIframe" src="" class="w-full h-full" frameborder="0" allowfullscreen></iframe>
    </div>
    <div class="p-4 flex justify-center gap-6 bg-black border-t border-white/5">
        <button onclick="skipMovie(-10)" class="skip-control">⏪ -10s</button>
        <button onclick="skipMovie(10)" class="skip-control">10s ⏩</button>
    </div>
    <div class="p-4 flex gap-2 overflow-x-auto no-scrollbar bg-[#080a0e]" id="serverList"></div>
</div>

<script>
    const API_KEY = '174d0214bf933dd59b3d5ec68a0c967f';
    let currentPage = 1, currentType = 'movie', currentLang = '', isFetching = false;
    let currentMovieId = '';

    async function fetchData(endpoint) {
        const res = await fetch(`https://api.themoviedb.org/3${endpoint}${endpoint.includes('?') ? '&' : '?'}api_key=${API_KEY}`);
        return await res.json();
    }

    async function init() {
        const heroData = await fetchData('/trending/movie/day');
        document.getElementById('slider-content').innerHTML = heroData.results.slice(0, 5).map((m, i) => `
            <div class="poster-3d ${i === 0 ? 'poster-active' : ''}" id="slide-${i}" onclick="playNow('${m.id}','movie')">
                <img src="https://image.tmdb.org/t/p/original${m.backdrop_path}" class="w-full h-full object-cover brightness-50">
                <div class="absolute bottom-10 left-5"><h2 class="text-2xl font-black uppercase">${m.title}</h2><span class="bg-[#ff4f00] px-3 py-1 rounded text-[10px] font-bold">WATCH NOW</span></div>
            </div>
        `).join('');
        
        let sIndex = 0;
        setInterval(() => { 
            const posters = document.querySelectorAll('.poster-3d');
            if(posters.length > 0) {
                posters.forEach(el => el.classList.remove('poster-active'));
                sIndex = (sIndex + 1) % posters.length;
                posters[sIndex].classList.add('poster-active');
            }
        }, 5000);
        
        loadMore();

        // UNLIMITED SCROLL LOGIC
        window.onscroll = function() {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) {
                loadMore();
            }
        };
    }

    async function loadMore() {
        if(isFetching) return; 
        isFetching = true;
        document.getElementById('loading').innerText = "Loading movies...";

        let endpoint = (currentLang) ? `/discover/movie?with_original_language=${currentLang}&page=${currentPage}&sort_by=popularity.desc` : `/${currentType}/popular?page=${currentPage}`;
        
        try {
            const data = await fetchData(endpoint);
            const grid = document.getElementById('popularGrid');
            
            data.results.forEach(m => {
                if(!m.poster_path) return;
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `
                    <div class="share-btn-mini" onclick="shareMovie(event, '${m.id}', '${currentType}')">🔗</div>
                    <div class="rating-badge">${m.vote_average.toFixed(1)} ⭐</div>
                    <img src="https://image.tmdb.org/t/p/w500${m.poster_path}" loading="lazy" onclick="playNow('${m.id}','${m.media_type || currentType}')">
                    <div class="absolute bottom-0 w-full p-2 bg-gradient-to-t from-black text-[10px] font-bold truncate">${m.title || m.name}</div>
                `;
                grid.appendChild(card);
            });
            currentPage++;
        } catch(e) { console.log(e); }
        
        isFetching = false;
        document.getElementById('loading').innerText = "Scroll for more";
    }

    function shareMovie(e, id, type) {
        e.stopPropagation();
        const url = window.location.href.split('?')[0] + `?id=${id}&type=${type}`;
        navigator.clipboard.writeText(url).then(() => alert("Link Copied! Share anywhere."));
    }

    function openModal(type) {
        const modal = document.getElementById('infoModal');
        modal.style.display = 'block';
        if(type === 'disclaimer') {
            document.getElementById('modalTitle').innerText = "Disclaimer";
            document.getElementById('modalBody').innerHTML = "PRI-MOVIES is a search engine for movies. We do not host any files on our servers. All contents are provided by non-affiliated third parties. If you have any legal issues please contact appropriate media file owners.";
        } else {
            document.getElementById('modalTitle').innerText = "Contact Us";
            document.getElementById('modalBody').innerHTML = "For any copyright issues or feedback, please contact us at:<br><br><span class='text-white font-bold'>help.wowmovies@gmail.com</span><br><br>We aim to respond within 24 hours.";
        }
    }

    function playNow(id, type) {
        currentMovieId = id;
        const t = (type === 'tv') ? 'tv' : 'movie';
        document.getElementById('playerOverlay').style.display = 'flex';
        const servers = [
            { n: "Server 1", u: `https://vidsrc.to/embed/${t}/${id}` },
            { n: "Server 2", u: `https://embed.su/embed/${t}/${id}` }
        ];
        document.getElementById('serverList').innerHTML = servers.map(s => `
            <button onclick="document.getElementById('mainIframe').src='${s.u}'" class="bg-[#1e232b] px-4 py-2 rounded font-bold text-[10px] active:bg-[#ff4f00] whitespace-nowrap">${s.n}</button>
        `).join('');
        document.getElementById('mainIframe').src = servers[0].u;
    }

    function filterBy(val, btn) {
        currentPage = 1; 
        document.getElementById('popularGrid').innerHTML = '';
        document.querySelectorAll('.filter-btn, .nav-item').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if(['hi', 'en', 'pa', 'te'].includes(val)) { currentLang = val; currentType = 'movie'; } 
        else { currentLang = ''; currentType = val; }
        loadMore();
    }

    function closePlayer() { 
        document.getElementById('playerOverlay').style.display = 'none'; 
        document.getElementById('mainIframe').src = ''; 
    }

    async function triggerSearch() {
        const q = document.getElementById('searchInput').value; if(!q) return;
        document.getElementById('popularGrid').innerHTML = '';
        const data = await fetchData(`/search/multi?query=${q}`);
        data.results.forEach(m => {
            if(!m.poster_path) return;
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.innerHTML = `<div class="rating-badge">${m.vote_average ? m.vote_average.toFixed(1) : 'N/A'} ⭐</div><img src="https://image.tmdb.org/t/p/w500${m.poster_path}" onclick="playNow('${m.id}','${m.media_type}')">`;
            document.getElementById('popularGrid').appendChild(card);
        });
    }

    function copyCurrentLink() {
        const url = window.location.href.split('?')[0] + `?id=${currentMovieId}&type=${currentType}`;
        navigator.clipboard.writeText(url).then(() => alert("Link Copied!"));
    }

    function skipMovie(seconds) {
        alert("Skip function triggered. Use player controls for precision.");
    }

    window.onload = init;
</script>
</body>
</html>
